# GitHub Actions workflow: build the image and deploy to Azure Container Apps.
# Runs automatically on every push to main. This is your CI/CD pipeline.

name: Deploy to Azure Container Apps

# ---- WHEN to run ----
on:
  push:
    branches: [main]        # every push to main triggers a deploy
  workflow_dispatch:        # also lets you run it manually from the Actions tab

# Values reused below. Change these if you rename things in Azure.
env:
  ACR_NAME: ca995bd2b1e5acr                 # Azure Container Registry (no .azurecr.io)
  IMAGE: terminal-cv                        # image name
  RESOURCE_GROUP: cv-rg-swe
  CONTAINER_APP: terminal-cv

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest                  # a fresh Linux VM GitHub gives us
    steps:
      # 1. Get your repo's code onto the runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Log in to Azure using the service-principal credentials stored as a
      #    GitHub secret (created during setup). Nothing sensitive is in the repo.
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.TERMINALCV_AZURE_CREDENTIALS }}

      # 3. Build the Docker image IN Azure Container Registry and push it.
      #    'az acr build' runs your multi-stage Dockerfile in the cloud, so the
      #    runner doesn't even need Docker. We tag the image with the git commit
      #    SHA so every deploy is traceable to exact code.
      - name: Build image in ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE:${{ github.sha }} \
            --image $IMAGE:latest \
            .

      # 4. Point the Container App at the new image. This creates a new revision
      #    and shifts traffic to it (your live URL updates automatically).
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE:${{ github.sha }}
