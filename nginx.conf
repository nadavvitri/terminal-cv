server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the requested file, else fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets in the browser for a week.
    location ~* \.(css|js|pdf|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
}
